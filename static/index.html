<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pi RPC Server</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --text-primary: #d4d4d4;
            --text-secondary: #9cdcfe;
            --border-color: #3c3c3c;
            --accent: #0e639c;
            --success: #4ec9b0;
            --custom-folder-bg: #2a2a2c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--bg-secondary); padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.1rem; margin: 0; }
        .status { display: flex; gap: 8px; align-items: center; }
        .badge { padding: 2px 8px; border-radius: 3px; font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
        .badge.connected { background: var(--success); color: #111; }
        .badge.disconnected { background: #ff4444; color: white; }
        
        #setup-panel { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 700px; margin: auto; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-row { display: flex; gap: 1rem; }
        label { font-weight: 500; }
        
        select, input[type="text"] { padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); font-size: 1rem; min-width: 0; }
        .input-group { display: flex; gap: 0.5rem; }
        .input-group input { flex: 1; }
        .input-group select { width: 200px; }
        
        .custom-path-input { display: none; margin-top: 0.5rem; }
        .custom-path-input.active { display: flex; }
        
        button { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .config-section { background: var(--bg-secondary); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .config-section h3 { margin-bottom: 0.5rem; color: var(--text-secondary); }
        
        /* Directory Browser Styles */
        #directory-browser-container {
            display: none;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.5rem;
            max-height: 400px;
            overflow: hidden;
            flex-direction: column;
        }
        .directory-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
        }
        .nav-button-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .nav-btn {
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .nav-btn:hover {
            background: var(--accent);
        }
        .nav-path {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 150px;
        }
        .search-box input {
            padding: 0.5rem;
            min-width: 200px;
            font-size: 0.85rem;
        }
        .directory-tree {
            overflow-y: auto;
            flex: 1;
            padding: 0.5rem;
        }
        .directory-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .tree-entry {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .tree-entry:hover {
            background: #2a2a2c;
        }
        .tree-entry.selected {
            background: var(--accent);
        }
        .tree-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.25rem;
            margin-right: 0.25rem;
        }
        .tree-btn:hover {
            color: var(--text-primary);
        }
        .file-icon {
            margin-right: 0.5rem;
            font-size: 1rem;
        }
        .file-name {
            flex: 1;
            margin-left: 0.25rem;
        }
        .file-name.selected-file {
            color: var(--success);
        }
        .status {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }
        .empty-dir {
            padding: 1rem;
            text-align: center;
            color: var(--text-secondary);
        }
        .browser-actions {
            border-top: 1px solid var(--border-color);
            padding: 0.5rem;
            margin-top: 0.5rem;
        }
        .toggle-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
        .toggle-btn:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
        }
        
        /* Custom folder dropdown styling */
        .custom-folder-option {
            background: var(--custom-folder-bg);
            border-left: 2px solid var(--success);
            padding-left: 0.75rem;
            cursor: pointer;
        }
        .custom-folder-option:hover {
            background: var(--accent);
        }
        .folder-tree-icon {
            margin-right: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* Active session UI */
        .session-ui { display: none; flex-direction: column; height: 100%; }
        .session-ui.active { display: flex; }
        
        .model-selector { display: flex; gap: 0.5rem; align-items: center; }
        .model-selector select { min-width: 200px; }
        .model-selector button { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        
        #sessions-panel { display: flex; gap: 1rem; flex: 1; overflow: hidden; }
        #session-list { width: 300px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); overflow-y: auto; }
        .session-item { padding: 0.75rem; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .session-item:hover { background: #2a2a2c; }
        .session-item.active { background: #37373d; border-left: 3px solid var(--accent); }
        .session-item-name { font-weight: 500; margin-bottom: 0.25rem; }
        .session-item-id { font-size: 0.8rem; color: var(--text-secondary); font-family: monospace; }
        
        #message-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #message-history { flex: 1; overflow-y: auto; padding: 1rem; }
        .message { max-width: 85%; margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; line-height: 1.5; }
        .message.user { background: var(--accent); align-self: flex-end; }
        .message.assistant { background: var(--bg-secondary); border: 1px solid var(--border-color); }
        .message-timestamp { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.25rem; }
        
        .editor { background: var(--bg-secondary); padding: 1rem; border-top: 1px solid var(--border-color); }
        .editor-content { display: flex; gap: 1rem; align-items: flex-start; }
        #prompt-input { flex: 1; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px; padding: 0.75rem; font-size: 1rem; resize: none; height: 60px; font-family: inherit; }
        #prompt-input:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body>
    <!-- Setup Panel (initially shown) -->
    <div id="setup-panel">
        <h1>Pi RPC Server</h1>
        
        <div class="config-section">
            <h3>Working Directory</h3>
            <div class="form-group">
                <label for="cwd-select">Select a directory:</label>
            </div>
            
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <div class="input-group">
                        <select id="cwd-select" onchange="toggleCustomPath()">
                            <option value="">Select preset...</option>
                            <option value="project">Current project repo</option>
                            <option value="~/">Home directory (~)</option>
                            <option value="/Users/karim">Karim's home</option>
                            <option value="/Users/karim/Projects">Projects folder</option>
                            <optgroup label="Custom folders">
                                <option value="custom" disabled>
                                    Select a folder below...
                                </option>
                            </optgroup>
                        </select>
                        <button onclick="piClient.toggleDirectoryBrowser()" class="toggle-btn">📁</button>
                    </div>
                    
                    <!-- Custom folders list -->
                    <div id="custom-folders-list" style="display: none; margin-top: 0.5rem;">
                        <div id="custom-folders-container" style="display: flex; flex-direction: column; gap: 0.25rem; max-height: 150px; overflow-y: auto;" style="background: var(--bg-primary); padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border-color);" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5" data-max-folder-count="5">
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="directory-browser-container">
                <div class="directory-nav">
                    <div class="nav-btn" onclick="piClient.browseUp()">⬆️ Up</div>
                    <div class="nav-button-group">
                        <button class="nav-btn" onclick="piClient.browseUp()">⬆️ Up</button>
                        <span class="nav-path" id="current-path" onclick="piClient.browseUp()" title="Click to go up"></span>
                    </div>
                    <input type="text" id="dir-search" placeholder="Search..." oninput="piClient.searchDirectory(this.value)">
                </div>
                <div class="directory-tree" id="directory-tree-tree">
                    <div class="empty-dir">Loading...</div>
                </div>
                <div class="browser-actions">
                    <button onclick="piClient.confirmSelection()" id="confirm-path-btn">✓ Confirm Selection</button>
                    <button onclick="piClient.toggleDirectoryBrowser()" class="toggle-btn">✕ Cancel</button>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 0.5rem;">
                <button onclick="loadSessionsAvailable()" id="load-sessions">Load Available Agents ↬</button>
            </div>
        </div>
        
        <div class="config-section" id="available-sessions" style="display:none;">
            <h3>Available Agent Sessions</h3>
            <div class="form-group">
                <label for="agent-select">Choose an existing agent:</label>
                <select id="agent-select" onchange="onAgentSelect()">
                    <option value="">Create new agent...</option>
                </select>
            </div>
            <div class="form-group">
                <button onclick="startSession()">Start Session ↬</button>
            </div>
        </div>
    </div>
    
    <!-- Active Session UI -->
    <div id="session-ui" class="session-ui">
        <header>
            <h1>Pi RPC Server</h1>
            <div class="status">
                <div class="badge disconnected" id="connection-badge">Disconnected</div>
                <div class="model-selector">
                    <select id="model-select" onchange="selectModel()">
                        <option value="">Loading models...</option>
                    </select>
                    <button onclick="refreshModels()">Refresh</button>
                </div>
            </div>
        </header>
        
        <div id="sessions-panel">
            <div id="session-list">
                <div id="session-tab-btn" class="session-item active" onclick="switchTab('messages')">
                    <div class="session-item-name">Messages</div>
                    <div class="session-item-id">Current session</div>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 0;">
                <div id="session-history" style="padding: 1rem;"></div>
            </div>
            
            <div id="message-area">
                <div id="message-history"></div>
                <div class="editor">
                    <div class="editor-content">
                        <textarea id="prompt-input" placeholder="Type your message..."></textarea>
                        <button onclick="sendPrompt()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js?v=1712779234"></script>
</body>
</html>
